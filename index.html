<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Detail Summary</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',Arial,sans-serif;font-size:14px;
  background:linear-gradient(135deg,#e8eaf6 0%,#e3f2fd 100%);
  color:#222;min-height:100vh;
}
.page{
  max-width:1200px;margin:15px auto;background:#fff;
  padding:25px 30px;border-radius:12px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
}
h1.main-title{
  text-align:center;font-size:clamp(16px,3vw,22px);font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:#1a237e;
  border-top:3px double #1a237e;border-bottom:3px double #1a237e;
  padding:10px 0;margin-bottom:8px;
}
h2.section-title{
  text-align:center;font-size:clamp(12px,2vw,15px);font-weight:700;
  text-transform:uppercase;color:#283593;margin-bottom:16px;letter-spacing:1px;
}
.particulars-table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:clamp(11px,1.5vw,14px);}
.particulars-table td{padding:10px 12px;border:1px solid #c5cae9;}
.particulars-table td.lbl{font-weight:700;background:#e8eaf6;width:160px;white-space:nowrap;color:#1a237e;font-size:clamp(10px,1.3vw,13px);}
.particulars-table input,.particulars-table select{width:100%;border:none;outline:none;background:transparent;font-size:clamp(11px,1.5vw,14px);font-family:inherit;color:#1a237e;padding:2px 0;}
.particulars-table select option{color:#222;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:15px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;padding:12px 28px;font-size:clamp(12px,1.5vw,15px);font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.25s;white-space:nowrap;}
.btn-calculate{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;box-shadow:0 4px 14px rgba(26,35,126,.30);}
.btn-calculate:hover{background:linear-gradient(135deg,#283593,#5c6bc0);box-shadow:0 6px 20px rgba(26,35,126,.40);transform:translateY(-2px);}
.btn-print{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;box-shadow:0 4px 14px rgba(46,125,50,.30);}
.btn-print:hover{background:linear-gradient(135deg,#388e3c,#66bb6a);box-shadow:0 6px 20px rgba(46,125,50,.40);transform:translateY(-2px);}
.btn-recalc{background:linear-gradient(135deg,#e65100,#f4511e);color:#fff;box-shadow:0 4px 14px rgba(230,81,0,.30);}
.btn-recalc:hover{background:linear-gradient(135deg,#bf360c,#e64a19);box-shadow:0 6px 20px rgba(230,81,0,.40);transform:translateY(-2px);}
.summary-boxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px;}
.sbox{border:2px solid #1a237e;border-radius:10px;padding:16px 18px;background:linear-gradient(135deg,#e8eaf6,#f5f5f5);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.sbox .slbl{font-weight:700;color:#1a237e;font-size:clamp(10px,1.1vw,12px);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.sbox .sval{font-size:clamp(15px,2vw,20px);font-weight:700;color:#b71c1c;}
.sbox .ssub{font-size:clamp(9px,1vw,11px);color:#555;margin-top:4px;line-height:1.5;}
.result-section{margin-top:20px;}
.result-section h3{font-size:clamp(12px,1.5vw,15px);font-weight:700;text-transform:uppercase;color:#1a237e;margin-bottom:10px;border-bottom:2px solid #3949ab;padding-bottom:6px;}
.table-container{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid #e0e0e0;}
table.pay-table{width:100%;border-collapse:collapse;font-size:clamp(10px,1.2vw,13px);min-width:700px;}
table.pay-table thead tr th{background:#1a237e;color:#fff;padding:10px 8px;text-align:center;border:1px solid #283593;font-size:clamp(9px,1vw,11px);letter-spacing:0.5px;position:sticky;top:0;z-index:2;}
table.pay-table tbody tr td{padding:7px 8px;border:1px solid #e0e0e0;text-align:center;vertical-align:middle;background:#fff;}
table.pay-table tbody tr.row-rev td{background:#fce4ec !important;font-weight:700;}
table.pay-table tbody tr.row-rev td.td-event{color:#b71c1c;text-align:left;}
table.pay-table tbody tr.row-mustered td{background:#e8eaf6 !important;font-weight:700;}
table.pay-table tbody tr.row-mustered td.td-event{color:#1a237e;text-align:left;}
table.pay-table tbody tr.row-pension td{background:#e1f5fe !important;font-weight:700;}
table.pay-table tbody tr.row-pension td.td-event{color:#0277bd;text-align:left;}
table.pay-table tbody tr.row-prom td{background:#f3e5f5 !important;font-weight:700;}
table.pay-table tbody tr.row-prom td.td-event{color:#6a1b9a;text-align:left;}
table.pay-table tbody tr.row-upgrade td{background:#fff3e0 !important;font-weight:700;}
table.pay-table tbody tr.row-upgrade td.td-event{color:#e65100;text-align:left;}
table.pay-table tbody tr.row-advinc td{background:#e8f5e9 !important;font-weight:700;}
table.pay-table tbody tr.row-advinc td.td-event{color:#2e7d32;text-align:left;}
table.pay-table tbody tr.row-inc td{background:#fff;}
table.pay-table tbody tr.row-inc td.td-event{text-align:left;}
.td-sno{font-weight:700;color:#555;width:36px;}
.td-pay{font-weight:700;color:#1a237e;white-space:nowrap;}
.td-chg{color:#2e7d32;font-weight:700;white-space:nowrap;}
.td-chg.neg{color:#c62828;}
.td-scale{font-size:clamp(9px,1vw,11px);color:#1a237e;font-weight:700;}
.td-remark{font-size:clamp(9px,1vw,11px);color:#555;text-align:left !important;}
.td-actions{white-space:nowrap;width:90px;}
.action-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;font-size:14px;transition:all 0.2s;margin:0 2px;}
.action-btn.add-btn{background:#e8eaf6;color:#1a237e;border-color:#c5cae9;}
.action-btn.add-btn:hover{background:#1a237e;color:#fff;border-color:#1a237e;transform:rotate(90deg);}
.action-btn.delete-btn{background:#ffebee;color:#c62828;border-color:#ffcdd2;}
.action-btn.delete-btn:hover{background:#c62828;color:#fff;border-color:#c62828;transform:scale(1.1);}
.action-btn.view-btn{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9;}
.action-btn.view-btn:hover{background:#2e7d32;color:#fff;border-color:#2e7d32;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:10000;align-items:center;justify-content:center;padding:15px;}
.modal-overlay.active{display:flex;}
.modal-box{background:#fff;border-radius:12px;padding:0;width:520px;max-width:95vw;max-height:90vh;box-shadow:0 12px 50px rgba(0,0,0,.30);animation:popIn 0.25s ease;overflow:hidden;display:flex;flex-direction:column;}
@keyframes popIn{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-header{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;padding:16px 22px;font-size:clamp(13px,1.5vw,16px);font-weight:700;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-header .modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1;padding:0 6px;transition:opacity 0.2s;}
.modal-header .modal-close:hover{opacity:.7;}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1;}
.modal-field{margin-bottom:16px;}
.modal-field label{display:block;font-weight:700;color:#1a237e;margin-bottom:6px;font-size:clamp(11px,1.2vw,13px);text-transform:uppercase;letter-spacing:.5px;}
.modal-field input,.modal-field select{width:100%;border:2px solid #c5cae9;border-radius:6px;padding:10px 12px;font-size:clamp(12px,1.3vw,14px);font-family:inherit;color:#222;outline:none;transition:border 0.2s;background:#fafafa;}
.modal-field input:focus,.modal-field select:focus{border-color:#3949ab;box-shadow:0 0 0 3px rgba(57,73,171,.12);background:#fff;}
.modal-field .hint{font-size:clamp(10px,1vw,12px);color:#777;margin-top:5px;line-height:1.4;}
.modal-footer{padding:14px 22px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #e0e0e0;flex-shrink:0;}
.btn-modal-ok{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;border:none;border-radius:6px;padding:10px 28px;font-size:clamp(12px,1.3vw,14px);font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.btn-modal-ok:hover{background:linear-gradient(135deg,#283593,#5c6bc0);}
.btn-modal-cancel{background:#fff;color:#555;border:2px solid #ccc;border-radius:6px;padding:10px 24px;font-size:clamp(12px,1.3vw,14px);cursor:pointer;transition:all 0.2s;}
.btn-modal-cancel:hover{background:#f5f5f5;border-color:#999;}
.modal-error{background:#ffebee;border:1px solid #ef9a9a;border-radius:6px;color:#c62828;padding:10px 14px;font-size:clamp(11px,1.1vw,13px);margin-bottom:14px;display:none;}
.modal-error.show{display:block;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #e8e8e8;}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-weight:700;color:#1a237e;font-size:12px;text-transform:uppercase;letter-spacing:.5px;min-width:120px;}
.detail-value{font-weight:600;color:#222;font-size:14px;text-align:right;}
.detail-value.highlight{color:#1a237e;font-size:16px;font-weight:700;}
.print-preview-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:20000;align-items:center;justify-content:center;padding:15px;}
.print-preview-overlay.active{display:flex;}
.print-preview-container{background:#fff;border-radius:12px;width:95vw;max-width:900px;max-height:90vh;box-shadow:0 12px 50px rgba(0,0,0,.40);display:flex;flex-direction:column;overflow:hidden;}
.print-preview-header{background:#1a237e;color:#fff;padding:14px 20px;font-size:clamp(13px,1.5vw,16px);font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.print-preview-header button{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 6px;transition:opacity 0.2s;}
.print-preview-header button:hover{opacity:.7;}
.print-preview-content{flex:1;overflow-y:auto;padding:20px;background:#fff;font-family:'Segoe UI',Arial,sans-serif;}
.print-preview-footer{border-top:1px solid #e0e0e0;padding:14px 20px;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;}
.pay-summary-footer{background:linear-gradient(135deg,#e3f2fd,#e8eaf6);border:1px solid #90caf9;border-radius:8px;padding:14px 18px;margin-top:16px;font-size:clamp(11px,1.2vw,14px);line-height:1.8;text-align:center;}
.error-msg{color:#c62828;font-weight:700;text-align:center;padding:20px;font-size:clamp(12px,1.3vw,15px);background:#ffebee;border-radius:8px;border:1px solid #ef9a9a;}
.hidden{display:none!important;}
.action-menu{position:fixed;background:#fff;border:2px solid #1a237e;border-radius:10px;padding:6px 0;z-index:15000;min-width:260px;box-shadow:0 8px 30px rgba(0,0,0,.25);font-family:inherit;font-size:13px;}
.action-menu-item{padding:10px 18px;cursor:pointer;transition:background 0.15s;white-space:nowrap;display:flex;align-items:center;gap:8px;}
.action-menu-item:hover{background:#e8eaf6;}
@media(max-width:768px){.page{margin:8px;padding:16px 12px;}.btn-row{flex-direction:column;}.btn{width:100%;}.summary-boxes{grid-template-columns:1fr;}.modal-box{width:98vw;}.td-actions{width:80px;}.action-btn{width:26px;height:26px;font-size:12px;}}
@media(max-width:480px){.page{padding:12px 8px;}table.pay-table{min-width:550px;font-size:10px;}}
</style>
</head>
<body>
<div class="page" id="page_content">
  <h1 class="main-title">Pay Detail Summary</h1>
  <br>
  <h2 class="section-title">Particulars of the Individual</h2>
  <br>
  <table class="particulars-table" id="particulars_section">
    <tr>
      <td class="lbl">Name</td>
      <td><input type="text" id="inp_name" placeholder="Enter Full Name"></td>
      <td class="lbl">Scale</td>
      <td><select id="inp_scale"><option value="">-- Select Scale --</option><option>Z-1</option><option>Z-2</option><option>Z-3</option><option>Y-1</option><option>Y-2</option><option>Y-3</option><option>Y-4</option><option>X-1</option><option>X-2</option><option>X-3</option><option>X-4</option></select></td>
    </tr>
    <tr>
      <td class="lbl">Date of Enrolment</td>
      <td><input type="date" id="inp_enrol"></td>
      <td class="lbl">Date of Mustered (Pass out date)</td>
      <td><input type="date" id="inp_mustred"></td>
    </tr>
    <tr>
      <td class="lbl">Date of Retirement</td>
      <td><input type="date" id="inp_retire"></td>
      <td></td><td></td>
    </tr>
  </table>
  <div class="btn-row">
    <button class="btn btn-calculate" onclick="calculatePay()">&#9654; GET PAY DETAILS</button>
  </div>
  <div id="result_area" class="hidden">
    <div class="btn-row" style="margin-bottom:18px;">
      <button class="btn btn-print" onclick="openPrintPreview()">&#128424; PRINT / SAVE PDF</button>
      <button class="btn btn-recalc" onclick="calculatePay()">&#8635; RECALCULATE</button>
    </div>
    <div id="summary_boxes" class="summary-boxes"></div>
    <div class="result-section">
      <h3>&#9654; Year-Wise Pay Details</h3>
      <div class="table-container"><div id="pay_table_area"></div></div>
    </div>
  </div>
  <div id="error_area" class="hidden error-msg"></div>
</div>

<div class="modal-overlay" id="main_modal">
  <div class="modal-box">
    <div class="modal-header"><span id="modal_title">Add Entry</span><button class="modal-close" onclick="closeModal()">&#10005;</button></div>
    <div class="modal-body" id="modal_body"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-ok" id="btn_modal_ok" onclick="applyModalAction()">&#10003; OK</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="view_modal">
  <div class="modal-box">
    <div class="modal-header"><span>&#128269; Entry Details</span><button class="modal-close" onclick="document.getElementById('view_modal').classList.remove('active')">&#10005;</button></div>
    <div class="modal-body" id="view_modal_body"></div>
    <div class="modal-footer"><button class="btn-modal-cancel" onclick="document.getElementById('view_modal').classList.remove('active')">Close</button></div>
  </div>
</div>

<div class="print-preview-overlay" id="print_preview_overlay">
  <div class="print-preview-container">
    <div class="print-preview-header"><span>&#128424; Print Preview</span><div style="display:flex;gap:10px;"><button onclick="saveAsPDF()" style="font-size:16px;">&#128190;</button><button onclick="printDocument()" style="font-size:16px;">&#128424;</button><button onclick="closePrintPreview()">&#10005;</button></div></div>
    <div class="print-preview-content" id="print_preview_content"></div>
    <div class="print-preview-footer">
      <button class="btn-modal-cancel" onclick="closePrintPreview()">Close</button>
      <button class="btn-modal-ok" onclick="saveAsPDF()">&#128190; Save PDF</button>
      <button class="btn-modal-ok" style="background:linear-gradient(135deg,#2e7d32,#43a047);" onclick="printDocument()">&#128424; Print</button>
    </div>
  </div>
</div>

// Helper functions
function pD(s){if(!s)return null;const p=s.split('-');if(p.length!==3)return null;const d=new Date(+p[0],+p[1]-1,+p[2]);return isNaN(d.getTime())?null:d;}
function fD(d){if(!d)return'';return String(d.getDate()).padStart(2,'0')+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear();}
function jN(d){return(d.getMonth()+1)>=6&&(d.getMonth()+1)<=11;}
function gSR(s){return PAY_SCALES[s]||[];}
function gSE(s,y){return gSR(s).find(r=>r.year===y)||null;}
function gARY(s,bd){const r=gSR(s);let f=r[0];for(const x of r){if(pD(x.year+'-01-01')<=bd)f=x;else break;}return f?f.year:r[0].year;}
function gSI(s,sy,p){const r=gSE(s,sy);if(!r)return 0;const i=r.stages.indexOf(p);return i>=0?i:0;}
function fOR(s,o,n,p){const or=gSE(s,o),nr=gSE(s,n);if(!or||!nr)return p;const si=gSI(s,o,p);return nr.stages[Math.min(si,nr.stages.length-1)];}
function aI(s,sy,p){const r=gSE(s,sy);if(!r)return p;const ci=gSI(s,sy,p);return ci>=r.stages.length-1?r.stages[r.stages.length-1]:r.stages[ci+1];}
function aMI(s,sy,p,c){let pp=p;for(let i=0;i<c;i++){const pr=pp;pp=aI(s,sy,pp);if(pp===pr)break;}return pp;}
function iMS(s,sy,p){const r=gSE(s,sy);return!!r&&p>=r.stages[r.stages.length-1];}
function gSS(s,sy){const r=gSE(s,sy);return r?`${r.min}-${r.inc}-${r.stages[r.stages.length-1]}`:'';}
function fixateToNextHigherOrEqual(scale,scaleYear,amount){const rev=gSE(scale,scaleYear);if(!rev)return amount;for(const stage of rev.stages){if(stage>=amount)return stage;}return rev.stages[rev.stages.length-1];}
function gASO(sel){return['Z-1','Z-2','Z-3','Y-1','Y-2','Y-3','Y-4','X-1','X-2','X-3','X-4'].map(s=>`<option value="${s}" ${s===sel?'selected':''}>${s}</option>`).join('');}

let G_R=[],G_MD=null,G_RD=null,G_IS='',G_MA=null,G_MI=null;

function calculatePay(){
  console.log('calculatePay() called');
  
  const nameEl=document.getElementById('inp_name');
  const mustredEl=document.getElementById('inp_mustred');
  const retireEl=document.getElementById('inp_retire');
  const scaleEl=document.getElementById('inp_scale');
  
  const name=nameEl.value.trim();
  const mustred=mustredEl.value;
  const retire=retireEl.value;
  const scale=scaleEl.value;
  
  console.log('Values:',{name,mustred,retire,scale});
  
  const errArea=document.getElementById('error_area');
  const resArea=document.getElementById('result_area');
  
  // Hide previous results
  errArea.classList.add('hidden');
  resArea.classList.add('hidden');
  
  // Validation
  if(!mustred||!retire||!scale){
    showErr('Please fill Date of Mustered (Pass out date), Date of Retirement, and Scale fields.');
    return;
  }
  
  const mD=pD(mustred);
  const rD=pD(retire);
  
  if(!mD){
    showErr('Invalid Date of Mustered. Please enter a valid date.');
    return;
  }
  if(!rD){
    showErr('Invalid Date of Retirement. Please enter a valid date.');
    return;
  }
  if(rD<=mD){
    showErr('Date of Retirement must be after Date of Mustered.');
    return;
  }
  
  const revisions=gSR(scale);
  if(!revisions||!revisions.length){
    showErr('Scale data not found for: '+scale);
    return;
  }
  
  G_MD=mD;
  G_RD=rD;
  G_IS=scale;
  
  // Determine active revision at mustered date
  const initRevYear=gARY(scale,mD);
  const initRev=gSE(scale,initRevYear);
  
  if(!initRev){
    showErr('Could not determine scale revision for mustered date.');
    return;
  }
  
  const mJN=jN(mD);
  const initPay=initRev.stages[0];
  
  let currentPay=initPay;
  let currentScale=scale;
  let currentRevYear=initRevYear;
  
  const rows=[];
  
  // Row 0: Mustered
  rows.push({
    id:'r1',
    eventLabel:`Mustered in Scale ${scale}`,
    date:mD,
    scale:currentScale,
    scaleRevYear:currentRevYear,
    pay:currentPay,
    changeAmt:0,
    remark:`Initial Stage 0 in ${scale}`,
    type:'mustered',
    skipNextInc:mJN
  });
  
  let skipFlag=mJN;
  
  // Process timeline events
  for(const ev of PAY_EVENTS){
    const evDate=pD(ev.date);
    if(!evDate)continue;
    if(evDate<=mD)continue;
    if(evDate>rD)break;
    
    if(ev.type==='inc'){
      if(skipFlag){
        skipFlag=false;
        rows.push({
          id:'r'+ (rows.length+1),
          eventLabel:ev.label+' (Skipped)',
          date:evDate,scale:currentScale,scaleRevYear:currentRevYear,
          pay:currentPay,changeAmt:0,
          remark:'Skipped (Mustered Jun-Nov)',
          type:'inc-skip'
        });
        continue;
      }
      if(iMS(currentScale,currentRevYear,currentPay)){
        rows.push({
          id:'r'+ (rows.length+1),
          eventLabel:ev.label+' (Max)',
          date:evDate,scale:currentScale,scaleRevYear:currentRevYear,
          pay:currentPay,changeAmt:0,
          remark:'At Max Stage',
          type:'inc'
        });
        continue;
      }
      const prevPay=currentPay;
      currentPay=aI(currentScale,currentRevYear,currentPay);
      rows.push({
        id:'r'+ (rows.length+1),
        eventLabel:ev.label,
        date:evDate,scale:currentScale,scaleRevYear:currentRevYear,
        pay:currentPay,changeAmt:currentPay-prevPay,
        remark:'Annual Increment',
        type:'inc'
      });
    }else if(ev.type==='rev'){
      if(!gSE(currentScale,ev.scaleYear))continue;
      const prevPay=currentPay;
      const oldRevYear=currentRevYear;
      currentRevYear=ev.scaleYear;
      currentPay=fOR(currentScale,oldRevYear,currentRevYear,prevPay);
      rows.push({
        id:'r'+ (rows.length+1),
        eventLabel:ev.label,
        date:evDate,scale:currentScale,scaleRevYear:currentRevYear,
        pay:currentPay,changeAmt:currentPay-prevPay,
        remark:'Same stage in revised scale',
        type:'rev'
      });
    }
  }
  
  // Pension increment if retired Jun-Nov
  const rJN=jN(rD);
  if(rJN&&!iMS(currentScale,currentRevYear,currentPay)){
    const prevPay=currentPay;
    const penPay=aI(currentScale,currentRevYear,currentPay);
    rows.push({
      id:'r'+ (rows.length+1),
      eventLabel:'Pension Increment',
      date:rD,scale:currentScale,scaleRevYear:currentRevYear,
      pay:penPay,changeAmt:penPay-prevPay,
      remark:'Retired Jun-Nov - Pension Added',
      type:'pension'
    });
  }
  
  G_R=rows;
  console.log('Generated rows:',G_R.length);
  
  // Render results
  renderSummaryBoxes(name,scale,initRev,mD,rD,rJN,mJN,initPay);
  renderTable();
  
  // Show result area
  resArea.classList.remove('hidden');
  
  // Scroll to results
  setTimeout(()=>{
    resArea.scrollIntoView({behavior:'smooth'});
  },100);
}

function renderSummaryBoxes(name,scale,initRev,mD,rD,rJN,mJN,initPay){
  console.log('renderSummaryBoxes called');
  const lastRow=G_R.length?G_R[G_R.length-1]:null;
  const finalPay=lastRow?lastRow.pay:initPay;
  
  const html=`

      <div class="slbl">Individual</div>
      <div class="sval">${name||'—'}</div>
      <div class="ssub">Scale: ${scale}</div>

    </div>
  `;
  
  document.getElementById('summary_boxes').innerHTML=html;
}

function renderTable(){
  console.log('renderTable called, rows:',G_R.length);
  
  G_R.forEach((r,i)=>r.sno=i+1);
  const lastRow=G_R[G_R.length-1];
  
  let html=`<table class="pay-table">
    <thead><tr>
      <th>S.No</th><th>Pay Details</th><th>Pay Scale</th>
      <th>Basic Pay (Rs)</th><th>Change (Rs)</th><th>Remarks</th>
      <th>Actions</th>
    </tr></thead><tbody>`;
  
  G_R.forEach((r,idx)=>{
    const rc=getRowClass(r.type);
    const sc=gSS(r.scale,r.scaleRevYear);
    const cc=r.changeAmt>0?'td-chg':(r.changeAmt<0?'td-chg neg':'td-chg');
    const ct=r.changeAmt>0?'+'+r.changeAmt.toLocaleString():(r.changeAmt<0?r.changeAmt.toLocaleString():'—');
    
    html+=`<tr class="${rc}">
      <td class="td-sno">${r.sno}</td>
      <td class="td-event">${r.eventLabel}</td>
      <td class="td-scale">${r.scale}<br><small>(${sc})</small></td>
      <td class="td-pay">${r.pay.toLocaleString()}</td>

      <td class="td-remark">${r.remark}</td>
      <td class="td-actions">
        <button class="action-btn view-btn" title="View" onclick="viewRow(${idx})">&#128269;</button>
        <button class="action-btn add-btn" title="Add" onclick="showActionMenu(${idx},event)">+</button>
        <button class="action-btn delete-btn" title="Delete" onclick="deleteRow(${idx})">&#10005;</button>
      </td>
    </tr>`;
  });
  
  html+=`</tbody></table>`;
  
  if(lastRow){
    html+=`<div class="pay-summary-footer">
      <b>Final Basic Pay at Retirement:</b>
      <span style="color:#b71c1c;font-size:16px;font-weight:700;margin-left:8px">Rs. ${lastRow.pay.toLocaleString()}</span>
      | <b>Scale:</b> ${lastRow.scale}
      | <b>Retirement:</b> ${fD(G_RD)}
    </div>`;
  }
  
  document.getElementById('pay_table_area').innerHTML=html;
  console.log('Table rendered successfully');
}

function getRowClass(t){
  switch(t){
    case'mustered':return'row-mustered';
    case'rev':return'row-rev';
    case'pension':return'row-pension';
    case'prom':return'row-prom';
    case'upgrade':return'row-upgrade';
    case'advinc':return'row-advinc';
    case'inc-skip':return'row-inc';
    default:return'row-inc';
  }
}

function aU(){
  const dS=document.getElementById('upgrade_date').value,s=document.getElementById('upgrade_scale').value;
  if(!dS||!s){alert('Fill all fields.');return;}
  const d=pD(dS);
  if(!d||d<G_MD||d>G_RD){alert('Invalid date.');return;}
  const pr=G_R[G_MI];if(!pr)return;
  const cP=pr.pay,cS=pr.scale,cRY=pr.scaleRevYear;
  const si=gSI(cS,cRY,cP),rY=gARY(s,d),nr=gSE(s,rY);
  if(!nr)return;
  const nP=nr.stages[Math.min(si,nr.stages.length-1)];
  const nrO={id:'r'+(Date.now()),eventLabel:`Upgradation to ${s}`,date:d,scale:s,scaleRevYear:rY,pay:nP,changeAmt:nP-cP,remark:`Same stage in ${s}`,type:'upgrade',isManual:true,skipNextInc:false};
  const ip=G_MI+1;
  const rB=G_R.slice(0,ip),rA=rP(s,rY,nP,d,false);
  G_R=[...rB,nrO,...rA];
  closeModal();renderTable();
}

function aAI(){
  const c=parseInt(document.getElementById('advinc_count').value),dS=document.getElementById('advinc_date').value;
  if(!c||c<1||c>5||!dS){alert('Fill all fields.');return;}
  const d=pD(dS);
  if(!d||d<G_MD||d>G_RD){alert('Invalid date.');return;}
  const pr=G_R[G_MI];if(!pr)return;
  const cP=pr.pay,cS=pr.scale,cRY=pr.scaleRevYear;
  if(iMS(cS,cRY,cP)){alert('Already at max stage.');return;}
  const nP=aMI(cS,cRY,cP,c);
  const nrO={id:'r'+(Date.now()),eventLabel:`Adv Inc (${c}x)`,date:d,scale:cS,scaleRevYear:cRY,pay:nP,changeAmt:nP-cP,remark:`${c} Advance Inc(s)`,type:'advinc',isManual:true,skipNextInc:false};
  const ip=G_MI+1;
  const rB=G_R.slice(0,ip),rA=rP(cS,cRY,nP,d,false);
  G_R=[...rB,nrO,...rA];
  closeModal();renderTable();
}

function aP(){
  const s=document.getElementById('prom_scale').value,o=document.getElementById('prom_option').value,dS=document.getElementById('prom_date').value;
  if(!s||!o||!dS){alert('Fill all fields.');return;}
  const d=pD(dS);
  if(!d||d<G_MD||d>G_RD){alert('Invalid date.');return;}
  const pr=G_R[G_MI];if(!pr)return;
  let cP=pr.pay,cS=pr.scale,cRY=pr.scaleRevYear;
  const pJN=jN(d);
  let pP=0,pR='',sk=false;
  if(o==='avail'){
    const s1=aI(cS,cRY,cP);
    const s2=aI(cS,cRY,s1);
    const totalFromOld=s2;
    const rY=gARY(s,d);
    pP=fixateToNextHigherOrEqual(s,rY,totalFromOld);
    cS=s;cRY=rY;sk=true;
    pR='Avail: Next+Inc→Fixated';
  }else{
    const rY=gARY(s,d),nr=gSE(s,rY);
    if(!nr)return;
    const si=gSI(cS,cRY,cP);
    const fixed=nr.stages[Math.min(si,nr.stages.length-1)];
    pP=aI(s,rY,fixed);
    cS=s;cRY=rY;
    pR='Not Avail: Fix+Inc';
  }
  const nrO={id:'r'+(Date.now()),eventLabel:`Promotion to ${s}`,date:d,scale:cS,scaleRevYear:cRY,pay:pP,changeAmt:pP-cP,remark:pR,type:'prom',isManual:true,skipNextInc:sk};
  const ip=G_MI+1;
  const rB=G_R.slice(0,ip),rA=rP(cS,cRY,pP,d,sk);
  G_R=[...rB,nrO,...rA];
  closeModal();renderTable();
}

function rP(s,ry,sP,aD,skF){
  const res=[];
  let cP=sP,cS=s,cRY=ry,sk=skF;
  for(const ev of PAY_EVENTS){
    const ed=pD(ev.date);
    if(!ed||ed<=aD||ed>G_RD)continue;
    if(ev.type==='inc'){
      if(sk){sk=false;res.push({id:'r'+(Date.now()+Math.random()),eventLabel:ev.label+' (Skip)',date:ed,scale:cS,scaleRevYear:cRY,pay:cP,changeAmt:0,remark:'Skip',type:'inc-skip'});continue;}
      if(iMS(cS,cRY,cP)){res.push({id:'r'+(Date.now()+Math.random()),eventLabel:ev.label+' (Max)',date:ed,scale:cS,scaleRevYear:cRY,pay:cP,changeAmt:0,remark:'Max',type:'inc'});continue;}
      const pr=cP;cP=aI(cS,cRY,cP);
      res.push({id:'r'+(Date.now()+Math.random()),eventLabel:ev.label,date:ed,scale:cS,scaleRevYear:cRY,pay:cP,changeAmt:cP-pr,remark:'Inc',type:'inc'});
    }else if(ev.type==='rev'){
      if(!gSE(cS,ev.scaleYear))continue;
      const pr=cP,oRY=cRY;cRY=ev.scaleYear;cP=fOR(cS,oRY,cRY,pr);
      res.push({id:'r'+(Date.now()+Math.random()),eventLabel:ev.label,date:ed,scale:cS,scaleRevYear:cRY,pay:cP,changeAmt:cP-pr,remark:'Revision',type:'rev'});
    }
  }
  if(jN(G_RD)&&!iMS(cS,cRY,cP)){
    const pr=cP;cP=aI(cS,cRY,cP);
    res.push({id:'r'+(Date.now()+Math.random()),eventLabel:'Pension Inc',date:G_RD,scale:cS,scaleRevYear:cRY,pay:cP,changeAmt:cP-pr,remark:'Pension',type:'pension'});
  }
  return res;
}

function openPrintPreview(){
  if(!G_R.length){alert('Calculate pay details first.');return;}
  const n=document.getElementById('inp_name').value||'—',en=document.getElementById('inp_enrol').value||'—',m=document.getElementById('inp_mustred').value||'—',r=document.getElementById('inp_retire').value||'—',s=document.getElementById('inp_scale').value||'—';
  let tR='';
  G_R.forEach((r,i)=>{
    r.sno=i+1;const sc=gSS(r.scale,r.scaleRevYear);
    const ch=r.changeAmt>0?'+'+r.changeAmt.toLocaleString():(r.changeAmt<0?r.changeAmt.toLocaleString():'—');
    tR+=`<tr style="background:${r.type==='mustered'?'#e8eaf6':r.type==='rev'?'#fce4ec':r.type==='pension'?'#e1f5fe':r.type==='prom'?'#f3e5f5':r.type==='upgrade'?'#fff3e0':r.type==='advinc'?'#e8f5e9':'#fff'};"><td style="padding:6px;border:1px solid #ddd;text-align:center;">${r.sno}</td><td style="padding:6px;border:1px solid #ddd;">${r.eventLabel}</td><td style="padding:6px;border:1px solid #ddd;text-align:center;font-size:10px;">${r.scale}<br>(${sc})</td><td style="padding:6px;border:1px solid #ddd;text-align:center;font-weight:bold;">${r.pay.toLocaleString()}</td><td style="padding:6px;border:1px solid #ddd;text-align:center;color:${r.changeAmt>0?'#2e7d32':r.changeAmt<0?'#c62828':'#000'};">${ch}</td><td style="padding:6px;border:1px solid #ddd;font-size:10px;">${r.remark}</td></tr>`;
  });
  const lR=G_R[G_R.length-1];
  document.getElementById('print_preview_content').innerHTML=`<div style="text-align:center;font-size:20px;font-weight:bold;border-top:3px double #000;border-bottom:3px double #000;padding:10px;margin-bottom:15px;">Pay Detail Summary</div><h3>Particulars</h3><table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;"><tr><td style="padding:8px;border:1px solid #999;font-weight:bold;background:#f5f5f5;">Name</td><td style="padding:8px;border:1px solid #999;">${n}</td><td style="padding:8px;border:1px solid #999;font-weight:bold;background:#f5f5f5;">Scale</td><td style="padding:8px;border:1px solid #999;">${s}</td></tr><tr><td style="padding:8px;border:1px solid #999;font-weight:bold;background:#f5f5f5;">Enrolment</td><td style="padding:8px;border:1px solid #999;">${en}</td><td style="padding:8px;border:1px solid #999;font-weight:bold;background:#f5f5f5;">Mustered</td><td style="padding:8px;border:1px solid #999;">${m}</td></tr><tr><td style="padding:8px;border:1px solid #999;font-weight:bold;background:#f5f5f5;">Retirement</td><td style="padding:8px;border:1px solid #999;">${r}</td><td style="padding:8px;border:1px solid #999;"></td><td style="padding:8px;border:1px solid #999;"></td></tr></table><h3>Pay Details</h3><table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr style="background:#1a237e;color:#fff;"><th style="padding:8px;">S.No</th><th style="padding:8px;">Pay Details</th><th style="padding:8px;">Scale</th><th style="padding:8px;">Basic Pay</th><th style="padding:8px;">Change</th><th style="padding:8px;">Remarks</th></tr></thead><tbody>${tR}</tbody></table><div style="font-weight:bold;padding:10px;background:#f0f0f0;border-radius:6px;margin-top:16px;">Final: Rs. ${lR.pay.toLocaleString()} | ${lR.scale}</div>`;
  document.getElementById('print_preview_overlay').classList.add('active');
}

function closePrintPreview(){document.getElementById('print_preview_overlay').classList.remove('active');}
function printDocument(){const c=document.getElementById('print_preview_content').innerHTML;const pw=window.open('','_blank','width=900,height=700');if(!pw)return;pw.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pay Detail</title><style>body{font-family:sans-serif;padding:20px;}@page{size:letter;margin:15mm;}</style></head><body>${c}</body></html>`);pw.document.close();setTimeout(()=>pw.print(),500);}
function saveAsPDF(){printDocument();}

// Close modals on overlay click
document.getElementById('main_modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('print_preview_overlay').addEventListener('click',function(e){if(e.target===this)closePrintPreview();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){document.getElementById('action_menu')?.remove();closeModal();closePrintPreview();document.getElementById('view_modal')?.classList.remove('active');}});

console.log('Script fully loaded and ready!');
</script>
